name: Feature request
description: Suggest a product or engineering improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your approach and tradeoffs
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
