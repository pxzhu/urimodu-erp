nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

api:
  replicaCount: 1
  image:
    repository: ghcr.io/example/korean-erp-api
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 4000
  env:
    API_PORT: "4000"
  envFromSecrets: []

web:
  replicaCount: 1
  image:
    repository: ghcr.io/example/korean-erp-web
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  env:
    NEXT_PUBLIC_API_BASE_URL: "http://korean-erp-api:4000"
  envFromSecrets: []

worker:
  replicaCount: 1
  image:
    repository: ghcr.io/example/korean-erp-worker
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  env:
    WORKER_PORT: "4100"
  envFromSecrets: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: erp.local
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: api
  tls: []

persistence:
  enabled: false
  storageClassName: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /var/lib/korean-erp

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
