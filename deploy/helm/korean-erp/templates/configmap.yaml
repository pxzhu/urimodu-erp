apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "korean-erp.fullname" . }}-env
  labels:
    {{- include "korean-erp.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.api.env }}
  API_{{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- range $key, $value := .Values.web.env }}
  WEB_{{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- range $key, $value := .Values.worker.env }}
  WORKER_{{ $key }}: {{ $value | quote }}
  {{- end }}
