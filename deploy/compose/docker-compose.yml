services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-erp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: erp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio123} &&
      mc mb -p local/${MINIO_BUCKET:-erp-files} || true
      "

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: erp-api
    environment:
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-erp}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: ${MINIO_BUCKET:-erp-files}
      MINIO_USE_SSL: "false"
      DOCS_SERVICE_BASE_URL: http://docs-service:4300
      INTEGRATION_INGEST_API_KEY: ${INTEGRATION_INGEST_API_KEY:-dev-integration-key}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: erp-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    container_name: erp-worker
    environment:
      WORKER_PORT: ${WORKER_PORT:-4100}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-erp}
      REDIS_URL: redis://redis:6379
      ATTENDANCE_NORMALIZE_BATCH_SIZE: ${ATTENDANCE_NORMALIZE_BATCH_SIZE:-500}
      WORKER_JOB_STALE_MS: ${WORKER_JOB_STALE_MS:-600000}
    ports:
      - "${WORKER_PORT:-4100}:4100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  connector-gateway:
    build:
      context: ../..
      dockerfile: apps/connector-gateway/Dockerfile
    container_name: erp-connector-gateway
    environment:
      CONNECTOR_GATEWAY_PORT: ${CONNECTOR_GATEWAY_PORT:-4200}
      EDGE_AGENT_SHARED_KEY: ${EDGE_AGENT_SHARED_KEY:-dev-edge-agent-key}
      INTEGRATION_INGEST_URL: http://api:4000/integrations/attendance/raw
      INTEGRATION_INGEST_API_KEY: ${INTEGRATION_INGEST_API_KEY:-dev-integration-key}
      DEFAULT_COMPANY_CODE: ${DEFAULT_COMPANY_CODE:-ACME_KR}
    ports:
      - "${CONNECTOR_GATEWAY_PORT:-4200}:4200"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4200/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  docs-service:
    build:
      context: ../..
      dockerfile: apps/docs-service/Dockerfile
    container_name: erp-docs-service
    environment:
      DOCS_SERVICE_PORT: ${DOCS_SERVICE_PORT:-4300}
    ports:
      - "${DOCS_SERVICE_PORT:-4300}:4300"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4300/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  minio_data:
